<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaute v33.9 - Estabilidad Final</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .card-custom { background: white; border-radius: 15px; padding: 15px; margin: 10px; border: 1px solid #e2e8f0; position: relative; }
        .form-control { padding: 0.7rem; border-radius: 10px; border: 2px solid #f1f5f9; text-transform: uppercase; font-weight: bold; font-size: 0.9rem; }
        .sug-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 10px; max-height: 180px; overflow-y: auto; z-index: 2000; border: 1px solid #e2e8f0; }
        .sug-item { padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-weight: 700; font-size: 0.85rem; }
        #ia-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #cam-preview-ia { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame { width: 80%; height: 35%; border: 2px solid #00e5c0; border-radius: 20px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 0 4000px rgba(0,0,0,0.7); pointer-events: none; }
        #key-config-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 25000; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="key-config-modal">
        <div class="card-custom w-100" style="max-width: 350px; text-align: center;">
            <h6 class="fw-bold mb-3">ACTIVAR APP YAUTE</h6>
            <p style="font-size: 0.7rem;" class="text-muted">Pega tu API Key (AQ o AIza).<br>No se subirá a internet, queda en tu celular.</p>
            <input type="text" id="user-gemini-key" class="form-control mb-3" placeholder="Pega aquí la clave...">
            <button class="btn btn-primary w-100 rounded-pill fw-bold" onclick="saveKey()">ACTIVAR AHORA</button>
        </div>
    </div>

    <header>
        <div class="d-flex justify-content-center align-items-center gap-2">
            <h6 class="m-0 fw-bold">Yaute v33.9</h6>
            <div id="status-dot" style="width:8px; height:8px; border-radius:50%; background:orange;"></div>
        </div>
    </header>

    <div id="home-selector" style="padding: 15px; display: flex; flex-direction: column; gap: 12px;">
        <button class="btn btn-dark py-3 rounded-4 fw-bold" onclick="openScanner()">
            <i class="fas fa-camera me-2"></i> ESCANEAR OFERTA (IA)
        </button>
        <button class="btn btn-primary py-3 rounded-4 fw-bold" onclick="showTab('operaciones')">
            <i class="fas fa-cash-register me-2"></i> REGISTRAR VENTAS
        </button>
    </div>

    <div id="tab-operaciones" style="display:none;">
        <div class="card-custom">
            <div class="row g-2 mb-2">
                <div class="col-6" style="position:relative"><label class="small fw-bold text-muted">TIENDA</label><input type="text" id="in-tienda" class="form-control"><div id="sug-tienda" class="sug-box d-none"></div></div>
                <div class="col-6" style="position:relative"><label class="small fw-bold text-muted">CLIENTE</label><input type="text" id="in-cliente" class="form-control"><div id="sug-cliente" class="sug-box d-none"></div></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-3"><label class="small fw-bold text-muted">CANT.</label><input type="number" id="in-cantidad" class="form-control text-center" value="1"></div>
                <div class="col" style="position:relative"><label class="small fw-bold text-muted">PRODUCTO</label><input type="text" id="in-producto" class="form-control" placeholder="BUSCAR..."><div id="sug-producto" class="sug-box d-none"></div></div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6"><label class="small fw-bold text-muted">COSTO $</label><input type="number" id="in-costo" class="form-control"></div>
                <div class="col-6"><label class="small fw-bold text-muted">VENTA $</label><input type="number" id="in-precio" class="form-control"></div>
            </div>
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow" onclick="saveRecord()">GUARDAR VENTA</button>
            <button class="btn btn-outline-secondary w-100 mt-2 rounded-pill border-0" onclick="location.reload()">VOLVER</button>
        </div>
    </div>

    <div id="ia-modal">
        <video id="cam-preview-ia" autoplay playsinline muted></video>
        <div class="scan-frame"></div>
        <button class="btn btn-dark btn-sm" style="position:absolute; top:15px; left:15px; border-radius:50px; font-weight: 800;" onclick="closeScanner()">✕ CERRAR</button>
        <button id="snap-btn" class="btn btn-light shadow-lg" style="position:absolute; bottom:35px; left:50%; transform:translateX(-50%); width:70px; height:70px; border-radius:50%;" onclick="captureIA()">
            <i class="fas fa-camera fa-2x text-primary"></i>
        </button>
    </div>

    <script>
        // TUS CREDENCIALES DE FIREBASE (ESTAS NO CAMBIAN)
        const firebaseConfig = { apiKey: "AIzaSyCR5V_yg6aLumW_D8oFPEblHZ5ox2gTs98", authDomain: "ofertas-rapidas-yautepec.firebaseapp.com", projectId: "ofertas-rapidas-yautepec", storageBucket: "ofertas-rapidas-yautepec.firebasestorage.app", messagingSenderId: "81339635207", appId: "1:81339635207:web:26d180f92224d9a036fca2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let state = { products: [], clients: [], stores: [] };
        let stream = null;

        function saveKey() {
            const val = document.getElementById('user-gemini-key').value.trim();
            if(val) { localStorage.setItem('yaute_key_v339', val); location.reload(); }
        }

        function startSync() {
            if(!localStorage.getItem('yaute_key_v339')) {
                document.getElementById('key-config-modal').style.display = 'flex';
                return;
            }
            const appId = 'yaute-v1-shared';
            ['products', 'clients', 'stores'].forEach(col => {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).onSnapshot(snap => {
                    state[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    document.getElementById('status-dot').style.background = "#10b981";
                });
            });
            setupAuto('in-tienda', 'sug-tienda', 'stores');
            setupAuto('in-cliente', 'sug-cliente', 'clients');
            setupAuto('in-producto', 'sug-producto', 'products');
        }

        function setupAuto(inpId, boxId, key) {
            const inp = document.getElementById(inpId);
            const box = document.getElementById(boxId);
            if(!inp) return;
            inp.oninput = () => {
                const val = inp.value.toUpperCase();
                if(!val) { box.classList.add('d-none'); return; }
                const filtered = state[key].map(x => (x.nombre || "").toUpperCase()).filter(s => s.includes(val)).slice(0, 5);
                box.innerHTML = filtered.map(s => `<div class="sug-item" onclick="selectSug('${inpId}','${boxId}','${s}','${key}')">${s}</div>`).join('');
                box.classList.remove('d-none');
            };
        }

        function selectSug(inpId, boxId, val, key) {
            document.getElementById(inpId).value = val;
            document.getElementById(boxId).classList.add('d-none');
            if(key === 'products') {
                const p = state.products.find(x => x.nombre.toUpperCase() === val);
                if(p) { document.getElementById('in-costo').value = p.costo; document.getElementById('in-precio').value = p.precio; }
            }
        }

        async function openScanner() {
            document.getElementById('home-selector').style.display = 'none';
            document.getElementById('ia-modal').style.display = 'flex';
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('cam-preview-ia').srcObject = stream;
        }

        function closeScanner() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('ia-modal').style.display = 'none';
            document.getElementById('home-selector').style.display = 'flex';
        }

        async function captureIA() {
            const key = localStorage.getItem('yaute_key_v339');
            const video = document.getElementById('cam-preview-ia');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            
            document.getElementById('snap-btn').innerHTML = '<i class="fas fa-spinner fa-spin text-primary"></i>';

            try {
                // MOTOR V1BETA PARA MÁXIMA COMPATIBILIDAD
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ inline_data: { mime_type: 'image/jpeg', data: b64 } }, { text: "MARCA Y NOMBRE DEL PRODUCTO. MAYÚSCULAS." }] }] })
                });
                
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);

                const nombre = data.candidates[0].content.parts[0].text.trim();
                const existe = state.products.find(p => p.nombre.toUpperCase() === nombre.toUpperCase());
                
                if(existe) alert("⚠️ YA ESTÁ EN CATÁLOGO");

                const v = prompt("PRECIO VENTA:", existe ? existe.precio : "");
                const a = prompt("PRECIO COSTO:", existe ? existe.costo : "");

                if(v) {
                    const blob = await (await fetch(canvas.toDataURL('image/jpeg'))).blob();
                    const f = new File([blob], 'oferta.jpg', { type: 'image/jpeg' });
                    if(navigator.share) await navigator.share({ files: [f], text: `🛒 *OFERTA*\n📦 ${nombre}\n💰 $${v}` });
                    if(!existe) db.collection('artifacts/yaute-v1-shared/public/data/products').add({ nombre, costo: parseFloat(a)||0, precio: parseFloat(v) });
                    location.reload();
                }
            } catch(e) { 
                alert("ERROR: " + e.message); 
                localStorage.removeItem('yaute_key_v339');
                location.reload();
            }
        }

        function showTab(id) {
            document.getElementById('home-selector').style.display = 'none';
            document.getElementById('tab-' + id).style.display = 'block';
        }

        async function saveRecord() {
            const t = document.getElementById('in-tienda').value.toUpperCase();
            const c = document.getElementById('in-cliente').value.toUpperCase();
            const p = document.getElementById('in-producto').value.toUpperCase();
            const q = parseInt(document.getElementById('in-cantidad').value);
            const co = parseFloat(document.getElementById('in-costo').value);
            const pr = parseFloat(document.getElementById('in-precio').value);
            if(!t || !c || !p) return alert("Faltan datos");
            await db.collection('artifacts/yaute-v1-shared/public/data/sales').add({ tienda: t, cliente: c, producto: p, cantidad: q, costo: co, precio: pr, total: q*pr, fechaStr: new Date().toLocaleDateString(), timestamp: Date.now() });
            alert("Guardado ✅");
            location.reload();
        }

        window.onload = startSync;
    </script>
</body>
</html>
