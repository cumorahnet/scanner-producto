<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Express — Antonio Hernandez</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
  :root { --bg: #0a0a0f; --accent: #00e5c0; --text: #e8e8f0; }
  body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; overflow: hidden; }
  #camera-feed { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .ui-overlay { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; pointer-events: none; }
  .btn-capture { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #fff; background: rgba(255,255,255,0.2); pointer-events: auto; align-self: center; }
  #result-view { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
  .input-f { width: 100%; background: #13131c; border: 1px solid #2a2a45; border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 10px; font-family: monospace; }
  .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
  #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; }
</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>

<div class="ui-overlay">
  <div style="font-weight: bold; color: var(--accent); pointer-events: auto;">SCANNER EXPRESS</div>
  <button class="btn-capture" onclick="capture()"></button>
</div>

<div id="result-view">
  <img id="result-photo" style="width:100%; height:250px; object-fit:cover;">
  <div style="padding: 20px;">
    <textarea id="field-desc" class="input-f" rows="3"></textarea>
    <input type="number" id="field-venta" class="input-f" placeholder="Precio Venta $">
    
    <button class="btn" style="background:var(--accent); color:#000;" onclick="shareEverything()">📲 ENVIAR POR WHATSAPP</button>
    
    <button class="btn" style="background:#2a2a45; color:#fff;" onclick="saveAndClose()">SOLO GUARDAR EN NUBE</button>
    <button class="btn" style="background:transparent; color:#ff4466;" onclick="location.reload()">CANCELAR</button>
  </div>
</div>

<div id="loader">⚙️ PROCESANDO...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB3kiLskvkV6cJ0byaCg_zqe-GIWM3jelI",
  authDomain: "ofertas-rapidas-con-scanner.firebaseapp.com",
  projectId: "ofertas-rapidas-con-scanner",
  storageBucket: "ofertas-rapidas-con-scanner.firebasestorage.app",
  messagingSenderId: "1093159890306",
  appId: "1:1093159890306:web:67211603ff99753207f39b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
let currentBlob = null;

async function start() {
  const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  document.getElementById('camera-feed').srcObject = s;
}
start();

function capture() {
  const v = document.getElementById('camera-feed');
  const canvas = document.createElement('canvas');
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext('2d').drawImage(v, 0, 0);
  canvas.toBlob(blob => {
    currentBlob = blob;
    document.getElementById('result-photo').src = URL.createObjectURL(blob);
    analyze(blob);
  }, 'image/jpeg', 0.8);
}

async function analyze(blob) {
  document.getElementById('loader').style.display = 'flex';
  const reader = new FileReader();
  reader.onloadend = async () => {
    const base64 = reader.result.split(',')[1];
    const key = localStorage.getItem('gemini_key') || prompt("Ingresa tu API Key:");
    if(key) localStorage.setItem('gemini_key', key);

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, {
      method: 'POST',
      body: JSON.stringify({ contents: [{ parts: [{ inline_data: { mime_type: 'image/jpeg', data: base64 } }, { text: "Dime marca y producto. Solo el nombre en MAYÚSCULAS." }] }] })
    });
    const d = await res.json();
    document.getElementById('field-desc').value = d.candidates[0].content.parts[0].text.trim();
    document.getElementById('loader').style.display = 'none';
    document.getElementById('result-view').style.display = 'flex';
  };
  reader.readAsDataURL(blob);
}

// ── ESTA FUNCIÓN ENVÍA LA FOTO REAL Y EL TEXTO SIN LINKS ──
async function shareEverything() {
  const nombre = document.getElementById('field-desc').value;
  const precio = document.getElementById('field-venta').value;
  const texto = `🛒 *OFERTA RÁPIDA*\n📦 PRODUCTO: ${nombre}\n💰 PRECIO: $${precio}`;

  if (navigator.share) {
    const file = new File([currentBlob], 'producto.jpg', { type: 'image/jpeg' });
    try {
      await navigator.share({
        files: [file],
        text: texto
      });
      // Después de compartir, guardamos en Firebase automáticamente para que no se pierda
      saveAndClose();
    } catch (e) {
      alert("Error al compartir. Intenta guardar primero.");
    }
  } else {
    alert("Tu navegador no soporta compartir archivos directamente.");
  }
}

async function saveAndClose() {
  document.getElementById('loader').style.display = 'flex';
  const path = `productos/${Date.now()}.jpg`;
  const ref = storage.ref(path);
  await ref.put(currentBlob);
  const foto = await ref.getDownloadURL();
  await db.collection("productos").add({
    nombre: document.getElementById('field-desc').value,
    precio_venta: parseFloat(document.getElementById('field-venta').value) || 0,
    foto, creado: firebase.firestore.FieldValue.serverTimestamp()
  });
  location.reload();
}
</script>
</body>
</html>
