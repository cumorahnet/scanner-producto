<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Express v8.3 — Antonio Hernandez</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
  :root { --bg: #0a0a0f; --accent: #00e5c0; --text: #e8e8f0; }
  body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; overflow: hidden; }
  #camera-feed { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .ui-overlay { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; pointer-events: none; }
  .btn-capture { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #fff; background: rgba(255,255,255,0.2); pointer-events: auto; align-self: center; }
  #result-view { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; overflow-y: auto; }
  .input-f { width: 100%; background: #13131c; border: 1px solid #2a2a45; border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 10px; font-family: monospace; font-size: 14px; }
  .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
  #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
  #key-modal { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>

<div class="ui-overlay">
  <div style="font-weight: bold; color: var(--accent); pointer-events: auto;">SCANNER EXPRESS PRO v8.3</div>
  <button class="btn-capture" onclick="capture()"></button>
</div>

<div id="key-modal">
  <h2 style="color:var(--accent);">⚙️ CONFIGURACIÓN</h2>
  <p style="font-size:12px; text-align:center; color:#6b6b8a;">La API Key ha expirado o no existe. Ingresa una nueva:</p>
  <input id="new-key-input" type="password" class="input-f" placeholder="AIzaSy...">
  <button class="btn" style="background:var(--accent); color:#000;" onclick="saveNewKey()">GUARDAR LLAVE</button>
</div>

<div id="result-view">
  <img id="result-photo" style="width:100%; height:250px; object-fit:cover;">
  <div style="padding: 20px;">
    <label style="font-size: 10px; color: #6b6b8a;">PRODUCTO IDENTIFICADO</label>
    <textarea id="field-desc" class="input-f" rows="2"></textarea>
    <div style="display: flex; gap: 10px;">
      <div style="flex: 1;"><label style="font-size: 10px; color: #6b6b8a;">ANAQUEL $</label><input type="number" id="field-anaquel" class="input-f" placeholder="0.00"></div>
      <div style="flex: 1;"><label style="font-size: 10px; color: #6b6b8a;">VENTA $</label><input type="number" id="field-venta" class="input-f" placeholder="0.00"></div>
    </div>
    <button class="btn" style="background:var(--accent); color:#000;" onclick="shareAndSave()">📲 ENVIAR Y GUARDAR NUBE</button>
    <button class="btn" style="background:transparent; border: 1px solid #ff4466; color:#ff4466;" onclick="location.reload()">CANCELAR</button>
  </div>
</div>

<div id="loader">
  <div id="spinner" style="border: 4px solid #2a2a45; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
  <p id="loader-text" style="margin-top: 15px; font-size: 12px;">PROCESANDO...</p>
  <button id="btn-rekey" class="btn" style="display:none; background:#ff4466; color:#fff;" onclick="showKeyModal()">CAMBIAR LLAVE</button>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
// TUS CREDENCIALES DE FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyB3kiLskvkV6cJ0byaCg_zqe-GIWM3jelI",
  authDomain: "ofertas-rapidas-con-scanner.firebaseapp.com",
  projectId: "ofertas-rapidas-con-scanner",
  storageBucket: "ofertas-rapidas-con-scanner.firebasestorage.app",
  messagingSenderId: "1093159890306",
  appId: "1:1093159890306:web:67211603ff99753207f39b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
let currentBlob = null;

async function start() {
  const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  document.getElementById('camera-feed').srcObject = s;
  if(!localStorage.getItem('gemini_key')) showKeyModal();
}
start();

function showKeyModal() {
  document.getElementById('key-modal').style.display = 'flex';
  document.getElementById('loader').style.display = 'none';
}

function saveNewKey() {
  const k = document.getElementById('new-key-input').value.trim();
  if(k) {
    localStorage.setItem('gemini_key', k);
    location.reload();
  }
}

function capture() {
  const v = document.getElementById('camera-feed');
  const canvas = document.createElement('canvas');
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext('2d').drawImage(v, 0, 0);
  canvas.toBlob(blob => {
    currentBlob = blob;
    document.getElementById('result-photo').src = URL.createObjectURL(blob);
    analyze(blob);
  }, 'image/jpeg', 0.8);
}

async function analyze(blob) {
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loader-text');
  loader.style.display = 'flex';
  
  const reader = new FileReader();
  reader.onloadend = async () => {
    const base64 = reader.result.split(',')[1];
    const key = localStorage.getItem('gemini_key');

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ inline_data: { mime_type: 'image/jpeg', data: base64 } }, { text: "Marca y producto. Responde solo el nombre en MAYÚSCULAS." }] }]
        })
      });

      const d = await res.json();
      if (!res.ok) throw new Error(d.error ? d.error.message : "Error API");

      document.getElementById('field-desc').value = d.candidates[0].content.parts[0].text.trim();
      loader.style.display = 'none';
      document.getElementById('result-view').style.display = 'flex';

    } catch(e) {
      loaderText.innerHTML = `<span style="color:#ff4466;">LLAVE INVÁLIDA O EXPIRADA</span>`;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-rekey').style.display = 'block';
    }
  };
  reader.readAsDataURL(blob);
}

async function shareAndSave() {
  const nombre = document.getElementById('field-desc').value;
  const anaquel = document.getElementById('field-anaquel').value || "0";
  const venta = document.getElementById('field-venta').value || "0";
  const textoWhatsApp = `🛒 *OFERTA RÁPIDA*\n📦 PRODUCTO: ${nombre}\n💰 PRECIO: $${venta}`;

  uploadToFirebase(nombre, anaquel, venta);

  if (navigator.share) {
    const file = new File([currentBlob], 'oferta.jpg', { type: 'image/jpeg' });
    try {
      await navigator.share({ files: [file], text: textoWhatsApp });
      setTimeout(() => location.reload(), 2000);
    } catch (e) { console.log("Compartir omitido"); }
  }
}

async function uploadToFirebase(nombre, anaquel, venta) {
  try {
    const path = `productos/${Date.now()}.jpg`;
    const ref = storage.ref(path);
    await ref.put(currentBlob);
    const foto = await ref.getDownloadURL();
    await db.collection("productos").add({
      nombre,
      precio_anaquel: parseFloat(anaquel),
      precio_venta: parseFloat(venta),
      foto, creado: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.error("Error nube:", e); }
}
</script>
</body>
</html>
