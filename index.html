<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Pro — Firebase Edition</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
  :root {
    --bg: #0a0a0f; --surface: #13131c; --border: #2a2a45;
    --accent: #00e5c0; --text: #e8e8f0; --muted: #6b6b8a;
    --warn: #ff6b6b; --success: #00c896;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:monospace; }

  /* Cámara y Views */
  #lens-view, #result-view, #analyzing-overlay { position: fixed; inset: 0; }
  #lens-view { background: #000; display: flex; flex-direction: column; z-index: 10; }
  #camera-feed { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  
  .lens-top { position: relative; z-index: 2; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); padding: 48px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
  .lens-bottom { position: absolute; bottom: 0; left: 0; right: 0; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding: 20px 24px 48px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  
  /* Botones */
  .btn-capture { width: 76px; height: 76px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.15); cursor: pointer; }
  .btn-capture::after { content: ''; display:block; margin:auto; width: 56px; height: 56px; border-radius: 50%; background: #fff; }
  .btn { padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; flex: 1; }
  .btn-primary { background: linear-gradient(135deg, #7c5cfc, #00e5c0); color: #000; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }

  /* Formulario Resultados */
  #result-view { background: var(--bg); z-index: 40; display: none; flex-direction: column; overflow-y: auto; }
  #result-view.show { display: flex; }
  .result-photo { width: 100%; height: 200px; object-fit: cover; }
  .result-body { padding: 20px; }
  .field-group { margin-bottom: 15px; }
  .label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
  .input-f { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; font-family: monospace; outline: none; }
  .input-f:focus { border-color: var(--accent); }

  /* Overlay de Carga */
  #analyzing-overlay { background: rgba(10,10,15,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #analyzing-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 10px 20px; border-radius: 8px; display: none; z-index: 1000; border: 1px solid var(--accent); }
</style>
</head>
<body>

<div id="lens-view">
  <video id="camera-feed" autoplay playsinline muted></video>
  <div class="lens-top">
    <div style="font-weight: bold;">📦 PRODUCT SCANNER</div>
    <button class="btn-outline" onclick="openSearch()" style="padding: 5px 10px; border-radius: 8px;">🔍 Buscar</button>
  </div>
  <div class="lens-bottom">
    <button class="btn-capture" onclick="captureAndAnalyze()"></button>
    <div style="font-size: 12px; opacity: 0.6;">Captura un producto para registrar</div>
  </div>
</div>

<div id="result-view">
  <img id="result-photo" class="result-photo" src="">
  <div class="result-body">
    <div class="field-group">
      <span class="label">Descripción extraída (Gemini)</span>
      <textarea id="field-desc" class="input-f" rows="3"></textarea>
    </div>

    <div style="display: flex; gap: 10px;">
      <div class="field-group" style="flex: 1;">
        <span class="label">Precio Anaquel ($)</span>
        <input type="number" id="field-costo" class="input-f" placeholder="0.00">
      </div>
      <div class="field-group" style="flex: 1;">
        <span class="label">Precio Venta ($)</span>
        <input type="number" id="field-venta" class="input-f" placeholder="0.00">
      </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button class="btn btn-outline" onclick="closeResult()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-firebase" onclick="saveToFirebase()">Guardar en Firebase</button>
    </div>
  </div>
</div>

<div id="analyzing-overlay">
  <div class="spinner"></div>
  <p id="status-text" style="margin-top: 15px; color: var(--accent);">Procesando con Gemini...</p>
</div>

<div id="search-modal" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:200; padding:20px;">
    <h3>Llamar Producto</h3>
    <input type="text" id="search-input" class="input-f" placeholder="Nombre del producto..." style="margin: 15px 0;">
    <button class="btn btn-primary" onclick="searchProduct()" style="width:100%">Buscar</button>
    <div id="search-results" style="margin-top:20px;"></div>
    <button class="btn btn-outline" onclick="document.getElementById('search-modal').style.display='none'" style="width:100%; margin-top:10px;">Cerrar</button>
</div>

<div id="toast" class="toast"></div>

<script>
// 1. CONFIGURACIÓN FIREBASE (REEMPLAZA CON TUS DATOS)
const firebaseConfig = {
  apiKey: "AIzaSyB3kiLskvkV6cJ0byaCg_zqe-GIWM3jelI",
  authDomain: "ofertas-rapidas-con-scanner.firebaseapp.com",
  projectId: "ofertas-rapidas-con-scanner",
  storageBucket: "ofertas-rapidas-con-scanner.firebasestorage.app",
  messagingSenderId: "1093159890306",
  appId: "1:1093159890306:web:67211603ff99753207f39b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// CONFIGURACIÓN GEMINI
const GEMINI_MODEL = 'gemini-1.5-flash'; // Actualizado a flash para velocidad
const SCAN_PROMPT = `Analiza este producto. Devuelve el nombre y marca en un JSON: {"resultado":"Nombre del producto"}`;

let capturedImageBlob = null;
let cameraStream = null;

// Iniciar Cámara al cargar
window.onload = () => {
  const savedKey = localStorage.getItem('gemini_key');
  if(!savedKey) {
      const key = prompt("Ingresa tu Gemini API Key:");
      if(key) localStorage.setItem('gemini_key', key);
  }
  startCamera();
};

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('camera-feed').srcObject = cameraStream;
  } catch(e) { showToast("Error de cámara"); }
}

async function captureAndAnalyze() {
  const video = document.getElementById('camera-feed');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  
  canvas.toBlob(async (blob) => {
    capturedImageBlob = blob;
    const reader = new FileReader();
    reader.onload = async (e) => {
        document.getElementById('result-photo').src = e.target.result;
        await sendToGemini(e.target.result.split(',')[1]);
    };
    reader.readAsDataURL(blob);
  }, 'image/jpeg', 0.8);
}

async function sendToGemini(base64) {
  document.getElementById('analyzing-overlay').classList.add('show');
  const apiKey = localStorage.getItem('gemini_key');

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
      method: 'POST',
      body: JSON.stringify({
        contents: [{ parts: [{ inline_data: { mime_type: 'image/jpeg', data: base64 } }, { text: SCAN_PROMPT }] }]
      })
    });

    const data = await resp.json();
    const rawText = data.candidates[0].content.parts[0].text;
    const cleanJson = JSON.parse(rawText.replace(/```json|```/g, ''));
    
    document.getElementById('field-desc').value = cleanJson.resultado;
    document.getElementById('analyzing-overlay').classList.remove('show');
    document.getElementById('result-view').classList.add('show');
  } catch (e) {
    showToast("Error Gemini");
    document.getElementById('analyzing-overlay').classList.remove('show');
  }
}

// GUARDAR EN FIREBASE
async function saveToFirebase() {
  const btn = document.getElementById('btn-save-firebase');
  btn.disabled = true;
  btn.innerText = "Guardando...";

  const nombre = document.getElementById('field-desc').value;
  const costo = document.getElementById('field-costo').value;
  const venta = document.getElementById('field-venta').value;

  try {
    // 1. Subir Imagen a Storage
    const fileName = `productos/${Date.now()}.jpg`;
    const storageRef = storage.ref(fileName);
    await storageRef.put(capturedImageBlob);
    const imageUrl = await storageRef.getDownloadURL();

    // 2. Guardar en Firestore
    await db.collection("productos").add({
      nombre,
      precio_anaquel: parseFloat(costo),
      precio_venta: parseFloat(venta),
      foto: imageUrl,
      fecha: firebase.firestore.FieldValue.serverTimestamp()
    });

    showToast("¡Producto Guardado!");
    closeResult();
  } catch (e) {
    console.error(e);
    showToast("Error al guardar");
  } finally {
    btn.disabled = false;
    btn.innerText = "Guardar en Firebase";
  }
}

// FUNCIÓN PARA "LLAMAR" PRODUCTO (BÚSQUEDA)
async function searchProduct() {
    const term = document.getElementById('search-input').value.toLowerCase();
    const resultsDiv = document.getElementById('search-results');
    resultsDiv.innerHTML = "Buscando...";

    try {
        const snapshot = await db.collection("productos")
            .where("nombre", ">=", term)
            .limit(5)
            .get();

        resultsDiv.innerHTML = "";
        snapshot.forEach(doc => {
            const p = doc.data();
            resultsDiv.innerHTML += `
                <div style="background:var(--surface); padding:10px; border-radius:8px; margin-bottom:10px; display:flex; align-items:center; gap:10px;">
                    <img src="${p.foto}" style="width:50px; height:50px; border-radius:5px; object-fit:cover;">
                    <div>
                        <div style="font-size:14px;">${p.nombre}</div>
                        <div style="color:var(--accent); font-size:12px;">Venta: $${p.precio_venta}</div>
                    </div>
                    <button onclick="compartirWA('${p.nombre}', ${p.precio_venta}, '${p.foto}')" style="background:none; border:none; font-size:20px; margin-left:auto; cursor:pointer;">📲</button>
                </div>
            `;
        });
    } catch(e) { showToast("Error en búsqueda"); }
}

function compartirWA(nombre, precio, link) {
    const msg = `*Producto:* ${nombre}%0A*Precio:* $${precio}%0A*Ver foto:* ${link}`;
    window.open(`https://wa.me/?text=${msg}`, '_blank');
}

function closeResult() {
  document.getElementById('result-view').classList.remove('show');
  document.getElementById('field-costo').value = "";
  document.getElementById('field-venta').value = "";
}

function openSearch() {
    document.getElementById('search-modal').style.display = 'block';
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
