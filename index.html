<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Pro — Antonio Hernandez</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
  :root {
    --bg: #0a0a0f; --surface: #13131c; --border: #2a2a45;
    --accent: #00e5c0; --text: #e8e8f0; --muted: #6b6b8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:monospace; overflow: hidden; }

  /* Vistas */
  #lens-view, #result-view, #analyzing-overlay { position: fixed; inset: 0; }
  #lens-view { background: #000; display: flex; flex-direction: column; z-index: 10; }
  #camera-feed { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  
  .ui-layer { position: relative; z-index: 20; height: 100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
  .ui-top { padding: 50px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
  .ui-bottom { padding: 40px 20px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
  
  .btn-capture { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #fff; background: rgba(255,255,255,0.2); cursor: pointer; }
  .btn-capture:active { transform: scale(0.9); }

  .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-family: monospace; }
  .btn-primary { background: var(--accent); color: #000; width: 100%; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

  #result-view { background: var(--bg); z-index: 50; display: none; flex-direction: column; overflow-y: auto; }
  #result-view.show { display: flex; }
  .result-photo { width: 100%; height: 250px; object-fit: cover; border-bottom: 2px solid var(--accent); }
  .result-body { padding: 20px; }
  
  .input-f { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 15px; font-family: monospace; }
  
  #analyzing-overlay { background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #analyzing-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ff4757; color: white; padding: 10px 20px; border-radius: 5px; display: none; z-index: 1000; font-size: 12px; }
</style>
</head>
<body>

<div id="lens-view">
  <video id="camera-feed" autoplay playsinline muted></video>
  <div class="ui-layer">
    <div class="ui-top">
      <div style="font-weight: bold; color: var(--accent);">PRO SCANNER v2</div>
      <button class="btn btn-outline" onclick="openSearch()">🔍 BUSCAR</button>
    </div>
    <div class="ui-bottom">
      <button class="btn-capture" onclick="captureAndAnalyze()"></button>
    </div>
  </div>
</div>

<div id="result-view">
  <img id="result-photo" class="result-photo">
  <div class="result-body">
    <label style="font-size: 10px; color: var(--muted);">PRODUCTO IDENTIFICADO</label>
    <textarea id="field-desc" class="input-f" rows="2"></textarea>
    
    <div style="display: flex; gap: 10px;">
      <div style="flex: 1;">
        <label style="font-size: 10px; color: var(--muted);">PRECIO ANAQUEL</label>
        <input type="number" id="field-costo" class="input-f" placeholder="0.00">
      </div>
      <div style="flex: 1;">
        <label style="font-size: 10px; color: var(--muted);">PRECIO VENTA</label>
        <input type="number" id="field-venta" class="input-f" placeholder="0.00">
      </div>
    </div>
    
    <button class="btn btn-primary" id="btn-save" onclick="saveData()">GUARDAR EN FIREBASE</button>
    <button class="btn btn-outline" onclick="closeResult()" style="width: 100%; margin-top: 10px;">DESCARTAR</button>
  </div>
</div>

<div id="analyzing-overlay">
  <div class="spinner"></div>
  <p style="margin-top: 15px;">ANALIZANDO CON IA...</p>
</div>

<div id="search-modal" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:200; padding:20px; overflow-y:auto;">
  <h3>Inventario</h3>
  <input type="text" id="search-input" class="input-f" placeholder="Buscar producto...">
  <button class="btn btn-primary" onclick="runSearch()">CONSULTAR</button>
  <div id="search-results" style="margin-top:20px;"></div>
  <button class="btn btn-outline" onclick="document.getElementById('search-modal').style.display='none'" style="width:100%; margin-top:20px;">CERRAR</button>
</div>

<div id="toast" class="toast"></div>

<script>
// 1. TUS CREDENCIALES
const firebaseConfig = {
  apiKey: "AIzaSyB3kiLskvkV6cJ0byaCg_zqe-GIWM3jelI",
  authDomain: "ofertas-rapidas-con-scanner.firebaseapp.com",
  projectId: "ofertas-rapidas-con-scanner",
  storageBucket: "ofertas-rapidas-con-scanner.firebasestorage.app",
  messagingSenderId: "1093159890306",
  appId: "1:1093159890306:web:67211603ff99753207f39b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let currentBlob = null;

// Iniciar Cámara
async function init() {
  const key = localStorage.getItem('gemini_key');
  if (!key) {
    const n = prompt("Pega tu API Key de Gemini (AIza...):");
    if (n) localStorage.setItem('gemini_key', n);
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('camera-feed').srcObject = stream;
  } catch (e) { alert("Error de cámara"); }
}
init();

async function captureAndAnalyze() {
  const video = document.getElementById('camera-feed');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  
  canvas.toBlob(async (blob) => {
    currentBlob = blob;
    const base64 = await blobToBase64(blob);
    document.getElementById('result-photo').src = URL.createObjectURL(blob);
    callIA(base64.split(',')[1]);
  }, 'image/jpeg', 0.8);
}

async function callIA(base64Data) {
  document.getElementById('analyzing-overlay').classList.add('show');
  const key = localStorage.getItem('gemini_key');
  
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ inline_data: { mime_type: 'image/jpeg', data: base64Data } }, { text: 'Identifica marca y producto. Responde solo el nombre corto.' }] }]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error.message);
    
    document.getElementById('field-desc').value = data.candidates[0].content.parts[0].text;
    document.getElementById('analyzing-overlay').classList.remove('show');
    document.getElementById('result-view').classList.add('show');
  } catch (e) {
    document.getElementById('analyzing-overlay').classList.remove('show');
    showToast("Error: " + e.message);
  }
}

async function saveData() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.innerText = "GUARDANDO...";
  
  try {
    const path = `fotos/${Date.now()}.jpg`;
    const ref = storage.ref(path);
    await ref.put(currentBlob);
    const url = await ref.getDownloadURL();
    
    await db.collection("productos").add({
      nombre: document.getElementById('field-desc').value,
      nombre_min: document.getElementById('field-desc').value.toLowerCase(),
      anaquel: parseFloat(document.getElementById('field-costo').value) || 0,
      venta: parseFloat(document.getElementById('field-venta').value) || 0,
      foto: url,
      creado: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    alert("¡Guardado correctamente!");
    closeResult();
  } catch (e) { showToast("Error Firebase: " + e.message); }
  btn.disabled = false; btn.innerText = "GUARDAR EN FIREBASE";
}

// Auxiliares
function blobToBase64(blob) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onloadend = () => resolve(r.result);
    r.readAsDataURL(blob);
  });
}

function showToast(m) {
  const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

function closeResult() { document.getElementById('result-view').classList.remove('show'); }
function openSearch() { document.getElementById('search-modal').style.display = 'block'; }

async function runSearch() {
  const term = document.getElementById('search-input').value.toLowerCase();
  const res = document.getElementById('search-results');
  res.innerHTML = "Buscando...";
  const snap = await db.collection("productos").where("nombre_min", ">=", term).where("nombre_min", "<=", term + "\uf8ff").get();
  res.innerHTML = "";
  snap.forEach(doc => {
    const p = doc.data();
    res.innerHTML += `<div style="background:var(--surface); padding:10px; margin-bottom:10px; border-radius:8px;">
      <img src="${p.foto}" style="width:100%; height:100px; object-fit:cover;">
      <p><b>${p.nombre}</b></p>
      <p style="color:var(--accent)">Venta: $${p.venta}</p>
    </div>`;
  });
}
</script>
</body>
</html>
