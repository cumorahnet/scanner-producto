<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaute v33.10 - Conexión Total</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .card-custom { background: white; border-radius: 15px; padding: 15px; margin: 10px; border: 1px solid #e2e8f0; position: relative; }
        .form-control { padding: 0.7rem; border-radius: 10px; border: 2px solid #f1f5f9; text-transform: uppercase; font-weight: bold; font-size: 0.9rem; }
        .sug-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 10px; max-height: 180px; overflow-y: auto; z-index: 2000; border: 1px solid #e2e8f0; }
        .sug-item { padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-weight: 700; font-size: 0.85rem; }
        #ia-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #cam-preview-ia { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame { width: 80%; height: 35%; border: 2px solid #00e5c0; border-radius: 20px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 0 4000px rgba(0,0,0,0.7); pointer-events: none; }
        #key-config-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 25000; display: none; align-items: center; justify-content: center; padding: 20px; }

        /* ── Panel de precios post-escaneo (reemplaza los prompt bloqueados) ── */
        #price-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 20000; display: none; align-items: flex-end; justify-content: center; padding: 20px; }
        #price-panel { background: white; border-radius: 24px 24px 16px 16px; padding: 24px; width: 100%; max-width: 400px; }
        #price-panel h6 { font-weight: 900; font-size: 0.85rem; color: #0f172a; margin-bottom: 4px; }
        #price-nombre { font-size: 0.75rem; color: #64748b; margin-bottom: 16px; word-break: break-word; }
    </style>
</head>
<body>

    <!-- Modal API Key -->
    <div id="key-config-modal">
        <div class="card-custom w-100" style="max-width: 350px; text-align: center;">
            <h6 class="fw-bold mb-3">ACTIVAR ESCÁNER</h6>
            <p style="font-size: 0.7rem;" class="text-muted">Pega tu API Key de Gemini.<br>Se guarda solo en este dispositivo.</p>
            <input type="text" id="user-gemini-key" class="form-control mb-3" placeholder="AIzaSy...">
            <button class="btn btn-primary w-100 rounded-pill fw-bold" onclick="saveKey()">ACTIVAR</button>
        </div>
    </div>

    <!-- Modal precios — reemplaza los prompt() bloqueados en móvil -->
    <div id="price-modal">
        <div id="price-panel">
            <h6>PRODUCTO ESCANEADO</h6>
            <div id="price-nombre"></div>
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small fw-bold text-muted">PRECIO VENTA $</label>
                    <input type="number" id="pm-venta" class="form-control" placeholder="0.00" step="0.01">
                </div>
                <div class="col-6">
                    <label class="small fw-bold text-muted">COSTO ANAQUEL $</label>
                    <input type="number" id="pm-costo" class="form-control" placeholder="0.00" step="0.01">
                </div>
            </div>
            <button class="btn btn-success w-100 py-3 rounded-pill fw-bold mb-2" onclick="confirmPrices()">
                📲 COMPARTIR Y GUARDAR
            </button>
            <button class="btn btn-outline-secondary w-100 rounded-pill border-0" onclick="cancelPrices()">
                CANCELAR
            </button>
        </div>
    </div>

    <header>
        <div class="d-flex justify-content-center align-items-center gap-2">
            <h6 class="m-0 fw-bold">Yaute v33.10</h6>
            <div id="status-dot" style="width:8px; height:8px; border-radius:50%; background:orange;"></div>
        </div>
    </header>

    <div id="home-selector" style="padding: 15px; display: flex; flex-direction: column; gap: 12px;">
        <button class="btn btn-dark py-3 rounded-4 fw-bold" onclick="openScanner()">
            <i class="fas fa-camera me-2"></i> ESCANEAR OFERTA (IA)
        </button>
        <button class="btn btn-primary py-3 rounded-4 fw-bold" onclick="showTab('operaciones')">
            <i class="fas fa-cash-register me-2"></i> REGISTRAR VENTAS
        </button>
    </div>

    <div id="tab-operaciones" style="display:none;">
        <div class="card-custom">
            <div class="row g-2 mb-2">
                <div class="col-6" style="position:relative"><label class="small fw-bold text-muted">TIENDA</label><input type="text" id="in-tienda" class="form-control"><div id="sug-tienda" class="sug-box d-none"></div></div>
                <div class="col-6" style="position:relative"><label class="small fw-bold text-muted">CLIENTE</label><input type="text" id="in-cliente" class="form-control"><div id="sug-cliente" class="sug-box d-none"></div></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-3"><label class="small fw-bold text-muted">CANT.</label><input type="number" id="in-cantidad" class="form-control text-center" value="1"></div>
                <div class="col" style="position:relative"><label class="small fw-bold text-muted">PRODUCTO</label><input type="text" id="in-producto" class="form-control" placeholder="BUSCAR..."><div id="sug-producto" class="sug-box d-none"></div></div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6"><label class="small fw-bold text-muted">COSTO $</label><input type="number" id="in-costo" class="form-control"></div>
                <div class="col-6"><label class="small fw-bold text-muted">VENTA $</label><input type="number" id="in-precio" class="form-control"></div>
            </div>
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveRecord()">GUARDAR VENTA</button>
            <button class="btn btn-outline-secondary w-100 mt-2 rounded-pill border-0" onclick="location.reload()">VOLVER</button>
        </div>
    </div>

    <div id="ia-modal">
        <video id="cam-preview-ia" autoplay playsinline muted></video>
        <div class="scan-frame"></div>
        <button class="btn btn-dark btn-sm" style="position:absolute; top:15px; left:15px; border-radius:50px;" onclick="closeScanner()">✕</button>
        <button id="snap-btn" class="btn btn-light shadow-lg" style="position:absolute; bottom:35px; left:50%; transform:translateX(-50%); width:70px; height:70px; border-radius:50%;" onclick="captureIA()">
            <i class="fas fa-camera fa-2x text-primary"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCR5V_yg6aLumW_D8oFPEblHZ5ox2gTs98", authDomain: "ofertas-rapidas-yautepec.firebaseapp.com", projectId: "ofertas-rapidas-yautepec", storageBucket: "ofertas-rapidas-yautepec.firebasestorage.app", messagingSenderId: "81339635207", appId: "1:81339635207:web:26d180f92224d9a036fca2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let state = { products: [], clients: [], stores: [] };
        let stream = null;
        let pendingNombre = '';   // guarda el nombre escaneado mientras el usuario digita precios
        let pendingCanvas = null; // guarda el canvas para el share

        function saveKey() {
            const val = document.getElementById('user-gemini-key').value.trim();
            if(val && val.length > 10) { localStorage.setItem('yaute_key_v3310', val); location.reload(); }
            else alert("La key parece inválida, verifica.");
        }

        function startSync() {
            if(!localStorage.getItem('yaute_key_v3310')) {
                document.getElementById('key-config-modal').style.display = 'flex';
                return;
            }
            const appId = 'yaute-v1-shared';
            ['products', 'clients', 'stores'].forEach(col => {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).onSnapshot(snap => {
                    state[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    document.getElementById('status-dot').style.background = "#10b981";
                });
            });
            setupAuto('in-tienda', 'sug-tienda', 'stores');
            setupAuto('in-cliente', 'sug-cliente', 'clients');
            setupAuto('in-producto', 'sug-producto', 'products');
        }

        function setupAuto(inpId, boxId, key) {
            const inp = document.getElementById(inpId);
            const box = document.getElementById(boxId);
            if(!inp) return;
            inp.oninput = () => {
                const val = inp.value.toUpperCase();
                if(!val) { box.classList.add('d-none'); return; }
                const filtered = state[key].map(x => (x.nombre || "").toUpperCase()).filter(s => s.includes(val)).slice(0, 5);
                box.innerHTML = filtered.map(s => `<div class="sug-item" onclick="selectSug('${inpId}','${boxId}','${s}','${key}')">${s}</div>`).join('');
                box.classList.remove('d-none');
            };
        }

        function selectSug(inpId, boxId, val, key) {
            document.getElementById(inpId).value = val;
            document.getElementById(boxId).classList.add('d-none');
            if(key === 'products') {
                const p = state.products.find(x => x.nombre.toUpperCase() === val);
                if(p) { document.getElementById('in-costo').value = p.costo; document.getElementById('in-precio').value = p.precio; }
            }
        }

        async function openScanner() {
            document.getElementById('home-selector').style.display = 'none';
            document.getElementById('ia-modal').style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
                document.getElementById('cam-preview-ia').srcObject = stream;
            } catch(e) {
                alert("Error de cámara: " + e.message);
                closeScanner();
            }
        }

        function closeScanner() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            stream = null;
            document.getElementById('ia-modal').style.display = 'none';
            document.getElementById('home-selector').style.display = 'flex';
        }

        /* ══════════════════════════════════════════════════════
           captureIA — CORRECCIONES:
           1. Modelo: gemini-2.5-flash-lite en v1beta (no gemini-1.5-flash en v1)
           2. Header Content-Type añadido (evita errores 400)
           3. prompt() reemplazado por panel #price-modal
           4. catch ya NO borra la key (solo muestra el error)
        ══════════════════════════════════════════════════════ */
        async function captureIA() {
            const key = localStorage.getItem('yaute_key_v3310');
            const video = document.getElementById('cam-preview-ia');

            if(!video.srcObject || video.videoWidth === 0) {
                alert("Cámara no lista, espera un momento.");
                return;
            }

            // Guardar canvas para reutilizarlo en confirmPrices()
            pendingCanvas = document.createElement('canvas');
            pendingCanvas.width  = video.videoWidth;
            pendingCanvas.height = video.videoHeight;
            pendingCanvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = pendingCanvas.toDataURL('image/jpeg', 0.88).split(',')[1];

            // Mostrar spinner en el botón
            const snapBtn = document.getElementById('snap-btn');
            snapBtn.innerHTML = '<i class="fas fa-spinner fa-spin text-primary fa-2x"></i>';
            snapBtn.disabled  = true;

            try {
                // FIX #1: modelo correcto + endpoint v1beta
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }, // FIX #2
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { inline_data: { mime_type: 'image/jpeg', data: b64 } },
                                { text: "Eres un lector experto de etiquetas de productos de consumo en México. Analiza la imagen y extrae: 1) Marca comercial, 2) Nombre del producto, 3) Presentación (gramaje, volumen, número de piezas, sabor o variante si aparece). Responde SOLO con el resultado en UNA LÍNEA en MAYÚSCULAS con el formato: MARCA NOMBRE PRESENTACIÓN. Sin explicaciones, sin puntos, sin saltos de línea." }
                            ]}],
                            generationConfig: { temperature: 0.1, maxOutputTokens: 100 }
                        })
                    }
                );

                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

                pendingNombre = data.candidates[0].content.parts[0].text.trim().toUpperCase();

                // FIX #3: mostrar panel en lugar de prompt()
                const existe = state.products.find(p => p.nombre.toUpperCase() === pendingNombre);
                document.getElementById('price-nombre').textContent = pendingNombre;
                document.getElementById('pm-venta').value = existe ? existe.precio : '';
                document.getElementById('pm-costo').value = existe ? existe.costo  : '';
                document.getElementById('price-modal').style.display = 'flex';

            } catch(e) {
                // FIX #4: NO borrar la key — puede ser un error de red puntual
                alert("Error al analizar: " + e.message);
            } finally {
                snapBtn.innerHTML = '<i class="fas fa-camera fa-2x text-primary"></i>';
                snapBtn.disabled  = false;
            }
        }

        /* Confirmación de precios desde el panel */
        async function confirmPrices() {
            const venta  = parseFloat(document.getElementById('pm-venta').value) || 0;
            const costo  = parseFloat(document.getElementById('pm-costo').value) || 0;
            const nombre = pendingNombre;

            document.getElementById('price-modal').style.display = 'none';

            // Compartir con Web Share API (imagen adjunta)
            if (pendingCanvas && navigator.canShare) {
                try {
                    const blob = await new Promise(r => pendingCanvas.toBlob(r, 'image/jpeg', 0.88));
                    const file = new File([blob], 'oferta.jpg', { type: 'image/jpeg' });
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            text: `🛒 *OFERTA RÁPIDA*\n📦 ${nombre}\n💰 $${venta}`
                        });
                    }
                } catch(e) {
                    if (e.name !== 'AbortError') console.warn("Share:", e.message);
                }
            }

            // Guardar en Firebase
            const existe = state.products.find(p => p.nombre.toUpperCase() === nombre);
            if (!existe) {
                db.collection('artifacts/yaute-v1-shared/public/data/products')
                  .add({ nombre, costo, precio: venta });
            } else {
                db.collection('artifacts/yaute-v1-shared/public/data/products')
                  .doc(existe.id).update({ costo, precio: venta });
            }

            closeScanner();
        }

        function cancelPrices() {
            document.getElementById('price-modal').style.display = 'none';
            pendingNombre = '';
            pendingCanvas = null;
        }

        function showTab(id) {
            document.getElementById('home-selector').style.display = 'none';
            document.getElementById('tab-' + id).style.display = 'block';
        }

        async function saveRecord() {
            const t  = document.getElementById('in-tienda').value.toUpperCase();
            const c  = document.getElementById('in-cliente').value.toUpperCase();
            const p  = document.getElementById('in-producto').value.toUpperCase();
            const q  = parseInt(document.getElementById('in-cantidad').value);
            const co = parseFloat(document.getElementById('in-costo').value);
            const pr = parseFloat(document.getElementById('in-precio').value);
            if(!t || !c || !p) return alert("Faltan datos");
            await db.collection('artifacts/yaute-v1-shared/public/data/sales').add({
                tienda: t, cliente: c, producto: p, cantidad: q,
                costo: co, precio: pr, total: q * pr,
                fechaStr: new Date().toLocaleDateString(), timestamp: Date.now()
            });
            alert("Guardado ✅");
            location.reload();
        }

        window.onload = startSync;
    </script>
</body>
</html>
