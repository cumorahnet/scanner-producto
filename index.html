<script>
    // ... (Mantén la configuración de Firebase igual) ...

    async function captureIA() {
        const key = localStorage.getItem('yaute_key_val');
        const video = document.getElementById('cam-preview-ia');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        
        document.getElementById('snap-btn').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            // CAMBIO CLAVE: Usamos v1beta y el modelo específico para llaves de Cloud
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            inline_data: { mime_type: 'image/jpeg', data: b64 }
                        }, {
                            text: "Identifica este producto. Responde SOLO el nombre y marca en MAYÚSCULAS."
                        }]
                    }]
                })
            });

            const d = await res.json();
            
            // Si la IA responde con error, te dirá exactamente qué dice Google
            if (d.error) {
                alert("Error de Google: " + d.error.message);
                return;
            }

            const nombre = d.candidates[0].content.parts[0].text.trim();
            
            // Lógica de duplicados y precios
            const existe = state.products.find(p => p.nombre.toUpperCase() === nombre.toUpperCase());
            if(existe) alert("⚠️ PRODUCTO YA EXISTE EN CATÁLOGO");

            const v = prompt("PRECIO VENTA:", existe ? existe.precio : "");
            const a = prompt("PRECIO ANAQUEL (COSTO):", existe ? existe.costo : "");

            if(v) {
                const blob = await (await fetch(canvas.toDataURL('image/jpeg'))).blob();
                const f = new File([blob], 'oferta.jpg', { type: 'image/jpeg' });
                if(navigator.share) await navigator.share({ files: [f], text: `🛒 *OFERTA*\n📦 ${nombre}\n💰 $${v}` });
                
                // Guardado en tu base de datos de Yautepec
                if(!existe) {
                    db.collection('artifacts/yaute-v1-shared/public/data/products').add({
                        nombre: nombre,
                        costo: parseFloat(a) || 0,
                        precio: parseFloat(v) || 0,
                        creado: Date.now()
                    });
                }
                location.reload();
            }
        } catch(e) { 
            alert("Error de conexión. Verifica que la llave esté bien pegada."); 
        } finally {
            document.getElementById('snap-btn').innerHTML = '<i class="fas fa-camera fa-2x"></i>';
        }
    }
    
    // ... (El resto del código de guardado de ventas se mantiene igual) ...
</script>
